apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api-service
  labels:
    app: rest-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rest-api
  template:
    metadata:
      labels:
        app: rest-api
        version: v1
    spec:
      containers:
      - name: api-container
        # Replace with your image URL from container registry
        image: gcr.io/[PROJECT-ID]/rest-api-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        
        # Resource requests and limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        
        # Liveness probe - checks if container is still alive
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - checks if container is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Security context - run as non-root
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      
      # Pod-level security context
      securityContext:
        fsGroup: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: rest-api-service
  labels:
    app: rest-api
spec:
  type: LoadBalancer  # For external access; change to ClusterIP for internal-only
  selector:
    app: rest-api
  ports:
  - protocol: TCP
    port: 80           # External port
    targetPort: 3000   # Container port
    name: http
  sessionAffinity: None
